<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Love Quote</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Georgia', serif;
        }
        .quote-box {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .quote {
            font-size: 24px;
            color: #d63031;
            margin-bottom: 15px;
        }
        .author {
            font-size: 18px;
            color: #636e72;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="quote-box">
        <p class="quote">"In your light I learn how to love."</p>
        <p class="author">- Rumi</p>
    </div>
</body>
</html>
